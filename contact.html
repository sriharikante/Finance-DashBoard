<form class="needs-validation" novalidate>

  <div class="mb-3">
    <label class="form-label">
      <i class="bi bi-person-fill"></i> Name
    </label>
    <input type="text" class="form-control bg-dark text-white border-secondary" required>
    <div class="invalid-feedback">Enter your name</div>
  </div>

  <div class="mb-3">
    <label class="form-label">
      <i class="bi bi-envelope-fill"></i> Email
    </label>
    <input type="email" class="form-control bg-dark text-white border-secondary" required>
    <div class="invalid-feedback">Enter valid email</div>
  </div>

  <div class="mb-3">
    <label class="form-label">
      <i class="bi bi-chat-left-text-fill"></i> Message
    </label>
    <textarea class="form-control bg-dark text-white border-secondary" rows="4" required></textarea>
    <div class="invalid-feedback">Enter your message</div>
  </div>

  <button class="btn btn-primary w-100">
    <i class="bi bi-send-fill"></i> Send
  </button>

</form>
