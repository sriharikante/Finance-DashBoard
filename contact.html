<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - AI Tools Hub</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">AI Tools Hub</a>
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <section class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-7 col-md-9">
            
            <div class="text-center mb-5">
              <h1 class="display-5 fw-bold">Get in Touch</h1>
              <p class="lead text-muted">
                Have any tool suggestions, feedback, or just want to say hello? Feel free to reach out!
              </p>
            </div>

            <div class="card shadow-sm p-4 p-md-5 bg-white">
              <form id="contactForm">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" required>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Subject</label>
                  <input type="text" class="form-control" placeholder="Suggestion / Feedback / Collaboration">
                </div>

                <div class="mb-4">
                  <label class="form-label">Your Message</label>
                  <textarea class="form-control" rows="6" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                  Send Message <i class="bi bi-send-fill ms-2"></i>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center py-4 bg-dark text-white mt-auto">
    <p class="mb-0">© 2026 AI Tools Hub • Made with curiosity by Hari</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("✅ Thank you for your message! I'll get back to you soon.");
      this.reset();
    });
  </script>
</body>
</html>
