<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools Hub | My Daily Toolkit</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">AI Tools Hub</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero text-white py-5" style="background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://source.unsplash.com/random/1600x900/?artificial-intelligence') no-repeat center center/cover;">
        <div class="container text-center py-5">
            <h1 class="display-4 fw-bold mb-3">My Favorite AI Tools</h1>
            <p class="lead mb-4" style="max-width: 700px; margin: auto;">
                I’ve been exploring AI tools for the past few months while learning web development.<br>
                Here’s my personal curated list of tools that actually help me daily.
            </p>
            <a href="#tools" class="btn btn-light btn-lg px-4">Browse My Tools ↓</a>
        </div>
    </section>

    <div class="container my-4">
        <!-- SEARCH -->
        <div class="text-center mb-4">
            <input type="text" id="searchInput" class="form-control mx-auto" 
                   placeholder="Search tools... (try typing ChatGPT or design)" style="max-width: 500px;">
        </div>

        <!-- FILTER -->
        <div class="text-center mb-5">
            <button class="btn btn-outline-primary filter-btn active mx-1 my-1" data-category="all">All Tools</button>
            <button class="btn btn-outline-primary filter-btn mx-1 my-1" data-category="writing">Writing</button>
            <button class="btn btn-outline-primary filter-btn mx-1 my-1" data-category="coding">Coding</button>
            <button class="btn btn-outline-primary filter-btn mx-1 my-1" data-category="design">Design</button>
        </div>
    </div>

    <!-- TOOLS SECTION -->
    <section id="tools" class="py-5 bg-light">
        <div class="container">
            <div class="row g-4" id="toolsContainer">
                <!-- Cards will stay here (same as before, but I suggest making descriptions slightly different) -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p class="mb-0">© 2026 AI Tools Hub • Made with curiosity by Hari</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Simple Search
        document.getElementById("searchInput").addEventListener("keyup", function() {
            let filter = this.value.toLowerCase();
            let cards = document.querySelectorAll(".card");

            cards.forEach(card => {
                let title = card.querySelector(".card-title").innerText.toLowerCase();
                let text = card.innerText.toLowerCase();
                card.parentElement.style.display = (title.includes(filter) || text.includes(filter)) ? "" : "none";
            });
        });

        // Filter Buttons
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                let category = btn.getAttribute("data-category");
                let cols = document.querySelectorAll(".col-md-4");

                cols.forEach(col => {
                    let card = col.querySelector(".card");
                    if (category === "all" || card.dataset.category === category) {
                        col.style.display = "";
                    } else {
                        col.style.display = "none";
                    }
                });
            });
        });
    </script>
</body>
</html>
