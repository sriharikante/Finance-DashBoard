<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Finance</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 shadow-sm">
  <div class="d-flex align-items-center gap-2">

    <!-- ☰ MENU BUTTON -->
    <button 
      class="btn btn-outline-light d-md-none"
      data-bs-toggle="collapse"
      data-bs-target="#sidebar"
    >
      <i class="bi bi-list"></i>
    </button>

    <span class="navbar-brand fw-semibold mb-0">My Finance</span>
  </div>

  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50 small">₹12,450</span>
    <i class="bi bi-person-circle fs-4 text-white"></i>
  </div>
</nav>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar" class="collapse d-md-block p-3">
    <p class="text-muted small">MENU</p>

    <a href="#" class="active d-block mb-2">Dashboard</a>
    <a href="#" class="d-block mb-2">Transactions</a>
    <a href="#" class="d-block mb-2">Analytics</a>
    <a href="#" class="d-block mb-2">Add Expense</a>
  </div>

  <!-- MAIN -->
  <div class="flex-grow-1 p-4">

    <!-- TITLE -->
    <h6 class="text-muted mb-3">Overview</h6>

    <!-- CARDS -->
    <div class="row g-3 mb-3">

      <div class="col-md-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between">
            <div>
              <small>Total Balance</small>
              <h6 class="fw-bold mb-0">₹12,450</h6>
            </div>
            <i class="bi bi-wallet2 text-primary"></i>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between">
            <div>
              <small>Income</small>
              <h6 class="fw-bold text-success mb-0">₹8,200</h6>
            </div>
            <i class="bi bi-arrow-down-circle text-success"></i>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between">
            <div>
              <small>Expenses</small>
              <h6 class="fw-bold text-danger mb-0">₹5,300</h6>
            </div>
            <i class="bi bi-arrow-up-circle text-danger"></i>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between">
            <div>
              <small>Savings</small>
              <h6 class="fw-bold mb-0">₹2,900</h6>
            </div>
            <i class="bi bi-piggy-bank text-secondary"></i>
          </div>
        </div>
      </div>

    </div>

    <!-- INSIGHT -->
    <p class="text-muted small mb-4">
      You spent slightly more this month compared to last month.
    </p>

    <!-- TRANSACTIONS -->
    <div class="card p-3 mb-4">
      <div class="d-flex justify-content-between mb-2">
        <h6 class="mb-0">Recent Transactions</h6>
        <button class="btn btn-sm btn-outline-dark">View All</button>
      </div>

      <table class="table">
        <tr>
          <td>Salary</td>
          <td class="text-success">+ ₹8200</td>
        </tr>
        <tr>
          <td>Groceries</td>
          <td class="text-danger">- ₹900</td>
        </tr>
      </table>
    </div>

    <!-- FORM -->
    <div class="card p-3">

      <h6>Add Expense</h6>

      <div class="row g-2">

        <div class="col-md-6">
          <input id="title" class="form-control" placeholder="Title">
        </div>

        <div class="col-md-6">
          <input id="amount" type="number" class="form-control" placeholder="Amount">
        </div>

        <div class="col-md-6">
          <select id="category" class="form-select">
            <option>Category</option>
            <option>Food</option>
            <option>Travel</option>
          </select>
        </div>

        <div class="col-md-6">
          <input id="date" type="date" class="form-control">
        </div>

        <div class="col-12">
          <button onclick="addTransaction()" class="btn btn-dark">
            Add Transaction
          </button>
        </div>

      </div>

    </div>

  </div>
</div>

<!-- Bootstrap JS (IMPORTANT for sidebar toggle) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
