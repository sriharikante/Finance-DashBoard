<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
  <span class="navbar-brand fw-semibold">FinanceDash</span>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50 small">Balance ₹12,450</span>
    <i class="bi bi-person-circle fs-4"></i>
  </div>
</nav>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div id="sidebar" class="bg-white border-end p-3">
    <p class="text-muted small">MENU</p>
    <a href="#" class="active">Dashboard</a>
    <a href="#">Transactions</a>
    <a href="#">Analytics</a>
    <a href="#">Add Expense</a>
  </div>

  <!-- MAIN -->
  <div class="flex-grow-1 p-4">

    <!-- CARDS -->
    <div class="row g-3 mb-4">

      <div class="col-md-3">
        <div class="card p-3">
          <small>Total Balance</small>
          <h5 class="fw-bold">₹12,450</h5>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3">
          <small>Income</small>
          <h5 class="fw-bold text-success">₹8,200</h5>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3">
          <small>Expenses</small>
          <h5 class="fw-bold text-danger">₹5,300</h5>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3">
          <small>Savings</small>
          <h5 class="fw-bold">₹2,900</h5>
        </div>
      </div>

    </div>

    <!-- TRANSACTIONS -->
    <div class="card p-3 mb-4">
      <div class="d-flex justify-content-between mb-2">
        <h6>Recent Transactions</h6>
        <button class="btn btn-sm btn-outline-dark">View All</button>
      </div>

      <table class="table">
        <tr>
          <td>Salary</td>
          <td class="text-success">+ ₹8200</td>
        </tr>
        <tr>
          <td>Groceries</td>
          <td class="text-danger">- ₹900</td>
        </tr>
      </table>
    </div>

    <!-- FORM -->
    <div class="card p-3">

      <h6>Add Expense</h6>

      <div class="row g-2">

        <div class="col-md-6">
          <input id="title" class="form-control" placeholder="Title">
        </div>

        <div class="col-md-6">
          <input id="amount" type="number" class="form-control" placeholder="Amount">
        </div>

        <div class="col-md-6">
          <select id="category" class="form-select">
            <option>Category</option>
            <option>Food</option>
            <option>Travel</option>
          </select>
        </div>

        <div class="col-md-6">
          <input id="date" type="date" class="form-control">
        </div>

        <div class="col-12">
          <button onclick="addTransaction()" class="btn btn-dark">
            Add Transaction
          </button>
        </div>

      </div>

    </div>

  </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
